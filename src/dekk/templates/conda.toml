# Environment (Conda) example

[project]
name = "ml-project"

[environment]
type = "conda"
path = "{project}/.dekk/env"
file = "environment.yaml"

[tools]
python = { command = "python", version = ">=3.10" }
jupyter = { command = "jupyter" }

[env]
PYTHONPATH = "{project}/src"

[paths]
bin = ["{project}/bin"]
